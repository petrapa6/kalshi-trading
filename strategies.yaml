# Strategy catalog for the Kalshi trading scanner backtest + (Phase 3) live scanner.
#
# Each strategy has an optional `description`, an optional `live` flag, and a
# required `triggers` list. A trigger is an OR-of-AND clause: any one trigger
# that matches all its conditions fires the strategy. Missing fields = no
# constraint on that dimension.
#
# Strategy-level fields:
#   live           Live-enabled: opts the strategy into real-money placement.
#                  Boolean, default false; must be a real bool (not 1/"yes").
#                  Backtest ignores it.
#
# Supported trigger fields:
#   sport          Sport family (e.g. football, baseball, tennis). UK terminology:
#                  use "football" (not "soccer"). The page-level Sport dropdown in
#                  the dashboard backtest filters strategies and leagues by this
#                  family; the live scanner (Phase 3) maps it to its per-league
#                  taxonomy.
#   sport_path     ESPN sport path (e.g. hockey/nhl, soccer/eng.1), narrower than
#                  `sport` and implying its family. Must exist in the sport
#                  registry. Live scanner only — info text in backtest.
#   min_minute     Game-clock minutes elapsed since start (sport-aware)
#   final_minutes  Bool. Match only in the sport's final-minutes window (final
#                  period past its end-of-game clock threshold; thresholds come
#                  from the sport registry). Never matches clockless sports
#                  (baseball). Live scanner only — info text in backtest.
#   min_lead       Minimum score lead in goals/points
#   min_volume     Minimum market volume. Live scanner only — no historical
#                  volume in backtest, so info text there.
#   min_yes_price  Minimum YES ask in cents (live scanner only — info text in backtest)
#   max_yes_price  Maximum YES ask in cents (live scanner only — info text in backtest)
#
# Validation is strict: extra fields are rejected; an empty triggers list is
# rejected; any error in any strategy rejects the entire file (loader returns
# an empty list and logs a warning).

strategies:
  conservative_late_lead:
    description: "Late game, modest lead, premium price — lowest variance preset"
    triggers:
      - sport: football
        min_minute: 80
        min_lead: 2
        min_yes_price: 92
        max_yes_price: 99

  early_value:
    description: "Earlier entry; requires bigger lead to compensate. Two-trigger OR-of-AND: a 65' / +3 entry OR a 75' / +4 stretch entry."
    triggers:
      - sport: football
        min_minute: 65
        min_lead: 3
        min_yes_price: 88
      - sport: football
        min_minute: 75
        min_lead: 4
        min_yes_price: 88

